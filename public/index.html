<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>나의 다이어리</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 로그인 화면 -->
  <div id="auth-section">
    <h1>나의 다이어리</h1>

    <div class="auth-box" id="login-form">
      <h2>로그인</h2>
      <input type="text"     id="login-username" placeholder="아이디" />
      <input type="password" id="login-password" placeholder="비밀번호" />
      <button id="login-btn">로그인</button>
      <p class="auth-switch">계정이 없으신가요? <a href="#" id="show-register">회원가입</a></p>
    </div>
  </div>

  <!-- 회원가입 모달 -->
  <div id="register-modal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <button id="modal-close-btn" class="modal-close">✕</button>
      <h2>회원가입</h2>
      <input type="text"     id="register-username" placeholder="아이디" />
      <input type="password" id="register-password" placeholder="비밀번호" />
      <button id="register-btn">가입 완료</button>
    </div>
  </div>

  <!-- 다이어리 메인 화면 (로그인 후 표시) -->
  <div id="app-section" style="display:none">

    <div class="app-header">
      <h1>나의 다이어리</h1>
      <div class="header-right">
        <span id="welcome-text"></span>
        <button id="logout-btn">로그아웃</button>
      </div>
    </div>

    <!-- 사진 슬라이드 영역 -->
    <section id="photo-section">
      <h2>사진</h2>

      <!-- 슬라이드 창 -->
      <div id="slideshow">
        <button id="prev-btn">&#8249;</button>
        <div id="slide-display">
          <p id="no-photo-msg">아직 사진이 없어요. 업로드해보세요!</p>
          <img id="slide-img" src="" alt="사진" style="display:none" />
        </div>
        <button id="next-btn">&#8250;</button>
      </div>

      <!-- 사진 개수 표시 -->
      <p id="slide-counter"></p>

      <!-- 업로드 / 삭제 버튼 -->
      <div id="photo-btns">
        <label id="upload-label">
          사진 올리기
          <input type="file" id="photo-input" accept="image/*" style="display:none" />
        </label>
        <button id="delete-photo-btn">현재 사진 삭제</button>
      </div>
    </section>

    <section>
      <h2>일기 쓰기</h2>
      <input type="text" id="title-input" placeholder="제목을 입력하세요" />
      <textarea id="content-input" placeholder="오늘 있었던 일을 적어보세요"></textarea>
      <button id="save-btn">저장하기</button>
    </section>

    <section>
      <h2>일기 목록</h2>
      <ul id="diary-list"></ul>
    </section>

  </div>

  <script src="app.js"></script>
</body>
</html>
