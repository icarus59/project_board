<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나의 다이어리</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 로그인 화면 -->
  <div id="auth-section">
    <h1>나의 다이어리</h1>

    <div class="auth-box" id="login-form">
      <h2>로그인</h2>
      <input type="text"     id="login-username" placeholder="아이디" />
      <input type="password" id="login-password" placeholder="비밀번호" />
      <button id="login-btn">로그인</button>
      <p class="auth-switch">계정이 없으신가요? <a href="#" id="show-register">회원가입</a></p>
      <p id="user-count-text" class="user-count-text"></p>
    </div>
  </div>

  <!-- 회원가입 모달 -->
  <div id="register-modal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <button id="modal-close-btn" class="modal-close">✕</button>
      <h2>회원가입</h2>
      <input type="text"     id="register-username"   placeholder="아이디" />
      <input type="password" id="register-password"   placeholder="비밀번호" />
      <input type="tel"      id="register-phone"      placeholder="전화번호 (예: 010-1234-5678)" />
      <input type="date"     id="register-birth-date" placeholder="생년월일" />
      <button id="register-btn">가입 완료</button>
    </div>
  </div>

  <!-- 마이페이지 모달 -->
  <div id="mypage-modal" class="modal-overlay" style="display:none">
    <div class="modal-box">
      <button id="mypage-close-btn" class="modal-close">✕</button>
      <h2>마이페이지</h2>
      <div class="mypage-info">
        <div class="mypage-row">
          <span class="mypage-label">아이디</span>
          <span id="mypage-username" class="mypage-value"></span>
        </div>
        <div class="mypage-row">
          <span class="mypage-label">전화번호</span>
          <span id="mypage-phone" class="mypage-value"></span>
        </div>
        <div class="mypage-row">
          <span class="mypage-label">생년월일</span>
          <span id="mypage-birth" class="mypage-value"></span>
        </div>
      </div>
      <div class="mypage-danger">
        <p class="danger-title">계정 탈퇴</p>
        <p class="danger-desc">탈퇴 시 모든 일기, 사진, 가족앨범이 영구 삭제됩니다.</p>
        <button id="withdraw-btn" class="withdraw-btn">회원 탈퇴</button>
      </div>
    </div>
  </div>

  <!-- 다이어리 메인 화면 (로그인 후 표시) -->
  <div id="app-section" style="display:none">

    <div class="app-header">
      <h1>나의 다이어리</h1>
      <div class="header-right">
        <span id="welcome-text"></span>
        <button id="mypage-btn">마이페이지</button>
        <button id="logout-btn">로그아웃</button>
      </div>
    </div>

    <!-- 탭 메뉴 -->
    <div class="tab-menu">
      <button class="tab-btn active" data-tab="diary">다이어리</button>
      <button class="tab-btn" data-tab="family">가족앨범</button>
    </div>

    <!-- 다이어리 탭 -->
    <div id="tab-diary">

    <!-- 사진 슬라이드 영역 -->
    <section id="photo-section">
      <h2>사진</h2>

      <!-- 슬라이드 창 -->
      <div id="slideshow">
        <button id="prev-btn">&#8249;</button>
        <div id="slide-display">
          <p id="no-photo-msg">아직 사진이 없어요. 업로드해보세요!</p>
          <img id="slide-img" src="" alt="사진" loading="lazy" style="display:none" />
        </div>
        <button id="next-btn">&#8250;</button>
      </div>

      <!-- 사진 개수 표시 -->
      <p id="slide-counter"></p>

      <!-- 업로드 / 삭제 버튼 -->
      <div id="photo-btns">
        <label id="upload-label">
          사진 올리기
          <input type="file" id="photo-input" accept="image/*" style="display:none" />
        </label>
        <button id="delete-photo-btn">현재 사진 삭제</button>
      </div>
    </section>

    <!-- 게시판: 글쓰기 + 목록 통합 -->
    <section class="board-section">

      <!-- 글쓰기 / 수정 패널 (기본 숨김) -->
      <div class="board-write" id="write-panel">
        <h2 id="write-panel-title">일기 쓰기</h2>
        <input type="text" id="title-input" placeholder="제목을 입력하세요" />
        <textarea id="content-input" placeholder="오늘 있었던 일을 적어보세요"></textarea>
        <div class="write-footer">
          <button id="cancel-write-btn" class="cancel-btn">취소</button>
          <button id="save-btn">저장하기</button>
        </div>
      </div>

      <!-- 검색 바 -->
      <div class="board-search">
        <div class="search-group">
          <select id="search-type">
            <option value="title">제목</option>
            <option value="content">내용</option>
          </select>
          <input type="text" id="search-input" placeholder="" />
          <button id="search-btn">검색</button>
        </div>
      </div>

      <!-- 게시판 테이블 -->
      <table class="board-table">
        <thead>
          <tr>
            <th class="col-check"><input type="checkbox" id="check-all" /></th>
            <th class="col-title">제목</th>
            <th class="col-author">작성자</th>
            <th class="col-date">날짜</th>
          </tr>
        </thead>
        <tbody id="diary-list"></tbody>
      </table>

      <!-- 하단 버튼 -->
      <div class="board-footer">
        <button id="bulk-delete-btn" class="delete-btn">삭제</button>
        <button id="write-toggle-btn">글쓰기</button>
      </div>

    </section>

    </div><!-- /tab-diary -->

    <!-- 가족앨범 탭 -->
    <div id="tab-family" style="display:none">
      <section id="family-section">
        <div class="family-header">
          <h2>가족앨범</h2>
          <label class="family-upload-label">
            사진/동영상 추가
            <input type="file" id="family-photo-input" accept="image/*,video/*" multiple style="display:none" />
          </label>
        </div>

        <!-- 업로드 폼 (사진/동영상 선택 후 표시) -->
        <div id="family-upload-form" style="display:none">
          <!-- 선택된 파일 큐 -->
          <div id="family-queue"></div>
          <label class="family-add-more-label">
            + 더 추가
            <input type="file" id="family-photo-input-more" accept="image/*,video/*" style="display:none" />
          </label>
          <input type="text" id="family-description" placeholder="설명을 입력하세요 (선택)" />
          <div class="family-form-btns">
            <button id="family-cancel-btn" class="cancel-btn">취소</button>
            <button id="family-save-btn">저장하기</button>
          </div>
        </div>

        <!-- 캐러셀 -->
        <div id="family-carousel">
          <button id="family-prev-btn">&#8249;</button>
          <div id="family-carousel-track"></div>
          <button id="family-next-btn">&#8250;</button>
        </div>
        <p id="family-empty-msg" class="family-empty" style="display:none">아직 사진이 없어요. 첫 번째 사진을 추가해보세요!</p>
        <p id="family-counter" class="family-counter"></p>
      </section>
      <!-- 가족 게시판 -->
      <section class="board-section">
        <h2 class="family-board-title">가족 게시판</h2>

        <!-- 글쓰기 / 수정 패널 -->
        <div class="board-write" id="family-write-panel">
          <h2 id="family-write-panel-title">글쓰기</h2>
          <input type="text" id="family-title-input" placeholder="제목을 입력하세요" />
          <textarea id="family-content-input" placeholder="내용을 입력하세요"></textarea>
          <div class="write-footer">
            <button id="family-cancel-write-btn" class="cancel-btn">취소</button>
            <button id="family-save-post-btn">저장하기</button>
          </div>
        </div>

        <!-- 검색 바 -->
        <div class="board-search">
          <div class="search-group">
            <select id="family-search-type">
              <option value="title">제목</option>
              <option value="content">내용</option>
            </select>
            <input type="text" id="family-search-input" placeholder="" />
            <button id="family-search-btn">검색</button>
          </div>
        </div>

        <!-- 게시판 테이블 -->
        <table class="board-table">
          <thead>
            <tr>
              <th class="col-check"><input type="checkbox" id="family-check-all" /></th>
              <th class="col-title">제목</th>
              <th class="col-author">작성자</th>
              <th class="col-date">날짜</th>
            </tr>
          </thead>
          <tbody id="family-post-list"></tbody>
        </table>

        <!-- 하단 버튼 -->
        <div class="board-footer">
          <button id="family-bulk-delete-btn" class="delete-btn">삭제</button>
          <button id="family-write-toggle-btn">글쓰기</button>
        </div>

      </section>

    </div><!-- /tab-family -->

    <!-- 가족앨범 상세 모달 -->
    <div id="family-modal" class="modal-overlay" style="display:none">
      <div class="family-modal-box">
        <button id="family-modal-close" class="modal-close">✕</button>
        <div id="family-modal-media"></div>
        <div class="family-modal-info">
          <p id="family-modal-date" class="family-card-date"></p>
          <input type="text" id="family-modal-desc-input" placeholder="설명을 입력하세요" />
          <div class="family-modal-btns">
            <button id="family-modal-delete-btn" class="delete-btn">삭제</button>
            <button id="family-modal-save-btn">수정 저장</button>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
